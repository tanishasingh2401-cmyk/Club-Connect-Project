<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Connect | Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Club<span>Connect</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="events.html">Events</a>
      <a href="register.html" class="active">Register</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <div style="text-align: center; margin-bottom: 3rem;">
        <h2 style="margin-bottom: 0.5rem;">Join the Community</h2>
        <p style="color: var(--text-gray);">Take the first step towards an exciting journey.</p>
      </div>
      
      <form onsubmit="alert('🎉 Registration successful! Welcome to the family!'); return false;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" placeholder="e.g. 23CSE001" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" placeholder="e.g. Computer Science" required>
        </div>

        <div class="form-group">
            <label>Select Your Club</label>
            <select required>
                <option value="" disabled selected>Choose a club...</option>
                <option>Kalakrit Club (Dance)</option>
                <option>Minerva Club (Literary)</option>
                <option>Sports Club (Athletics)</option>
                <option>Picturesque Club (Photography)</option>
                <option>E-cell (Entrepreneurship)</option>
            </select>
        </div>

        <div class="form-group">
            <label>University Email</label>
            <input type="email" placeholder="name@college.edu" required>
        </div>

        <div class="form-group">
            <label>Why do you want to join?</label>
            <textarea rows="4" placeholder="Tell us about your interest..."></textarea>
        </div>

        <button type="submit">Complete Registration</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2025 Club Connect | Your Journey Starts Here</p>
  </footer>

  <script src="script.js"></script> 

</body>
</html>
